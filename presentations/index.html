<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Презентации — sleep3r</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --panel: #ffffff;
      --text: #181c24;
      --muted: #6d7485;
      --accent1: #56a6af;
      --accent2: #b19503;
      --border: #e6ebf2;
      --shadow: rgba(16, 24, 40, 0.12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      background:
        radial-gradient(800px 500px at 15% -10%, rgba(86,166,175,0.14), transparent 60%),
        radial-gradient(680px 460px at 90% -10%, rgba(206,173,4,0.12), transparent 65%),
        var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .page {
      width: min(860px, 100%);
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: 0 20px 45px var(--shadow), 0 4px 18px rgba(16,24,40,0.08);
      overflow: hidden;
    }

    .hero {
      position: relative;
      padding: 32px 28px 24px;
      background: linear-gradient(95deg, rgba(86,166,175,0.09), rgba(206,173,4,0.08));
      border-bottom: 1px solid var(--border);
      text-align: center;
    }

    .hero::after {
      content: "";
      position: absolute;
      inset: auto 0 0;
      height: 2px;
      background: linear-gradient(90deg, var(--accent1), var(--accent2));
      opacity: 0.7;
    }

    h1 {
      margin: 0;
      font-size: clamp(24px, 4vw, 34px);
      letter-spacing: 0.02em;
    }

    .subtitle {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 15px;
    }

    .content { padding: 24px; }

    .grid {
      display: grid;
      gap: 16px;
    }

    .card {
      display: flex;
      gap: 18px;
      align-items: center;
      padding: 20px 22px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: 0 8px 20px rgba(16,24,40,0.05);
      transition: border-color 140ms ease, transform 140ms ease, box-shadow 140ms ease;
      text-decoration: none;
      color: inherit;
    }

    .card:hover {
      border-color: rgba(86,166,175,0.5);
      transform: translateY(-2px);
      box-shadow: 0 12px 28px rgba(16,24,40,0.1);
    }

    .card-icon {
      flex-shrink: 0;
      width: 56px;
      height: 56px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      background: linear-gradient(135deg, rgba(86,166,175,0.15), rgba(206,173,4,0.12));
    }

    .card-body { flex: 1; min-width: 0; }

    .card-title {
      margin: 0;
      font-size: 18px;
      font-weight: 700;
      line-height: 1.3;
    }

    .card-desc {
      margin: 5px 0 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.45;
    }

    .card-tags {
      margin-top: 8px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .tag {
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 3px 9px;
      font-size: 11px;
      color: var(--muted);
      background: #f4f7fb;
    }

    .card-arrow {
      flex-shrink: 0;
      font-size: 20px;
      color: var(--accent1);
      opacity: 0.5;
      transition: opacity 140ms ease, transform 140ms ease;
    }

    .card:hover .card-arrow {
      opacity: 1;
      transform: translateX(3px);
    }

    .back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 18px;
      font-size: 14px;
      color: var(--muted);
      text-decoration: none;
      transition: color 120ms ease;
    }

    .back:hover { color: var(--text); }

    @media (max-width: 640px) {
      .card { flex-direction: column; text-align: center; }
      .card-arrow { display: none; }
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="hero">
      <h1>Презентации</h1>
      <p class="subtitle">Материалы лекций и докладов</p>
    </header>

    <section class="content">
      <div class="grid" id="grid"></div>
      <a href="/" class="back">← sleep3r.ru</a>
    </section>
  </main>

  <script>
    const presentations = [
      {
        id: 't-ai',
        icon: '📐',
        title: 'Сборы по ИИ',
        desc: 'Олимпиадная математика, теорвер, линал, оптимизация, марковские цепи, мартингалы, теория информации',
        tags: ['LaTeX', 'PDF', 'Beamer'],
        href: './t-ai/'
      },
      {
        id: 'rwb-ai',
        icon: '📊',
        title: 'Университет RWB — Оценка эффекта AI',
        desc: 'Бизнес-кейс, экономическая модель, риски, комплаенс. Распознавание документов, видеоаналитика, AI-саппорт',
        tags: ['Reveal.js', 'Slides'],
        href: './rwb-ai/'
      }
    ];

    const grid = document.getElementById('grid');

    presentations.forEach(p => {
      const a = document.createElement('a');
      a.className = 'card';
      a.href = p.href;

      a.innerHTML = `
        <div class="card-icon">${p.icon}</div>
        <div class="card-body">
          <h2 class="card-title">${p.title}</h2>
          <p class="card-desc">${p.desc}</p>
          <div class="card-tags">${p.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
        </div>
        <span class="card-arrow">→</span>
      `;

      grid.appendChild(a);
    });
  </script>
</body>
</html>
