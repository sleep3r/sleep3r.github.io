<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Презентации — sleep3r</title>
  <style>
    :root {
      --bg: #272822;
      --bg2: #3e3d32;
      --ink: #f8f8f2;
      --muted: #75715e;
      --a1: #66d9ef;
      --a2: #ae81ff;
      --a3: #a6e22e;
      --a4: #f92672;
      --glass: rgba(62,61,50,0.82);
      --edge: #49483e;
    }

    * { box-sizing: border-box; margin: 0; }

    body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
      font-family: -apple-system, system-ui, "Segoe UI", Roboto, Arial, sans-serif;
      line-height: 1.5;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    a { color: inherit; text-decoration: none; }

    .page {
      width: min(780px, 100%);
      border: 1px solid var(--edge);
      border-radius: 18px;
      backdrop-filter: saturate(140%) blur(8px);
      background: var(--glass);
      box-shadow: 0 20px 60px rgba(0,0,0,0.45);
      overflow: hidden;
    }

    .top-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-bottom: 1px solid rgba(73,72,62,0.6);
    }
    .dot { width: 10px; height: 10px; border-radius: 50%; }
    .dot.r { background: #ff5f56; }
    .dot.y { background: #ffbd2e; }
    .dot.g { background: #27c93f; }
    .top-bar .label { margin-left: 6px; font-size: 13px; color: var(--muted); }

    .hero {
      padding: 36px 28px 24px;
      text-align: center;
      border-bottom: 1px solid var(--edge);
    }

    h1 {
      font-size: clamp(22px, 4vw, 32px);
      font-weight: 700;
      letter-spacing: 0.02em;
      color: var(--a1);
    }

    .subtitle {
      margin-top: 6px;
      color: var(--muted);
      font-size: 14px;
    }

    .content { padding: 20px; }

    .grid { display: grid; gap: 14px; }

    .card {
      display: flex;
      gap: 16px;
      align-items: center;
      padding: 18px 20px;
      background: rgba(39,40,34,0.6);
      border: 1px solid var(--edge);
      border-radius: 14px;
      transition: border-color 140ms ease, transform 140ms ease, box-shadow 140ms ease;
      cursor: pointer;
    }

    .card:hover {
      border-color: var(--a1);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.3);
    }

    .card-icon {
      flex-shrink: 0;
      width: 50px;
      height: 50px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      background: rgba(102,217,239,0.1);
      border: 1px solid rgba(102,217,239,0.2);
    }

    .card-body { flex: 1; min-width: 0; }

    .card-title {
      font-size: 17px;
      font-weight: 700;
      color: var(--ink);
      line-height: 1.3;
    }

    .card-desc {
      margin-top: 4px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .card-tags {
      margin-top: 8px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .tag {
      border: 1px solid var(--edge);
      border-radius: 999px;
      padding: 2px 9px;
      font-size: 11px;
      color: var(--a3);
      background: rgba(166,226,46,0.06);
    }

    .card-arrow {
      flex-shrink: 0;
      font-size: 18px;
      color: var(--a1);
      opacity: 0.3;
      transition: opacity 140ms ease, transform 140ms ease;
      font-family: ui-monospace, monospace;
    }

    .card:hover .card-arrow {
      opacity: 1;
      transform: translateX(3px);
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 18px;
      font-size: 13px;
      color: var(--muted);
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      transition: color 120ms ease;
    }
    .back-link:hover { color: var(--a1); }

    @media (max-width: 640px) {
      .card { flex-direction: column; text-align: center; }
      .card-arrow { display: none; }
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="top-bar">
      <span class="dot r"></span><span class="dot y"></span><span class="dot g"></span>
      <span class="label">presentations — sleep3r</span>
    </div>

    <header class="hero">
      <h1>Презентации</h1>
      <p class="subtitle">Материалы лекций и докладов</p>
    </header>

    <section class="content">
      <div class="grid" id="grid"></div>
      <a href="/" class="back-link">← cd ~</a>
    </section>
  </main>

  <script>
    const presentations = [
      {
        icon: '📐',
        title: 'Сборы по ИИ',
        desc: 'Олимпиадная математика, теорвер, линал, оптимизация, марковские цепи, мартингалы, теория информации',
        tags: ['LaTeX', 'PDF', 'Beamer'],
        href: './t-ai/'
      },
      {
        icon: '📊',
        title: 'Университет RWB — Оценка эффекта AI',
        desc: 'Бизнес-кейс, экономическая модель, риски, комплаенс. Распознавание документов, видеоаналитика, AI-саппорт',
        tags: ['Reveal.js', 'Slides'],
        href: './rwb-ai/'
      }
    ];

    const grid = document.getElementById('grid');
    presentations.forEach(p => {
      const a = document.createElement('a');
      a.className = 'card';
      a.href = p.href;
      a.innerHTML = `
        <div class="card-icon">${p.icon}</div>
        <div class="card-body">
          <h2 class="card-title">${p.title}</h2>
          <p class="card-desc">${p.desc}</p>
          <div class="card-tags">${p.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
        </div>
        <span class="card-arrow">→</span>
      `;
      grid.appendChild(a);
    });
  </script>
</body>
</html>
